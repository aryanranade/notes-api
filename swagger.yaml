openapi: 3.0.0
info:
  title: Notes Management API
  description: Secure backend API for managing personal notes with RBAC.
  version: 1.0.0
servers:
  - url: /api
    description: Current Environment
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                role:
                  type: string
                  enum: [USER, ADMIN]
      responses:
        '201':
          description: Created
  /auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
  /auth/refresh:
    post:
      summary: Refresh JWT Access Token
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
  /notes:
    get:
      summary: Get user's notes
      tags:
        - Notes
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search Notes by Title
      responses:
        '200':
          description: List of notes
    post:
      summary: Create a new note
      tags:
        - Notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        '201':
          description: Note Created
  /notes/{id}:
    get:
      summary: Get a specific note by ID
      tags:
        - Notes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Note object
        '404':
          description: Not Found
    put:
      summary: Update a specific note
      tags:
        - Notes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Updated Note
        '404':
          description: Not Found
    delete:
      summary: Delete a specific note
      tags:
        - Notes
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted successfully
        '404':
          description: Not Found
  /admin/notes:
    get:
      summary: Get all notes in the system (Admin only)
      tags:
        - Admin
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
  /admin/notes/{id}:
    delete:
      summary: Delete any note (Admin only)
      tags:
        - Admin
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
        '404':
          description: Not Found
